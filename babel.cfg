# pybabel-extract configuration for ntasker.
#
# Two extractors:
#  * `python` -- pulls msgids from `_(...)`, `_lazy(...)`, gettext(), ngettext().
#  * `jinja2` -- pulls msgids from {% trans %}, {{ _('...') }}, {{ t('...') }} and
#    the gettext extension's plural form.
#
# `extensions` enables the i18n Jinja extension so the parser knows about
# {% trans %} blocks. `silent=true` keeps the extractor going across templates
# that lack i18n calls.
#
# Globs are relative to each input path passed on the command line. We
# pass `src/ntasker` as the input root, so `**.py` matches every Python
# file (any depth). For templates it's `templates/**.html` because the
# templates live one level below the package root.
[python: **.py]

[jinja2: templates/**.html]
extensions=jinja2.ext.i18n
silent=true
